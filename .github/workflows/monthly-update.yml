name: Monthly production update

# Publishing dates at ENS vary, so we try three times a month, plus a manual
# trigger. The pipeline is idempotent: with no new reports it produces no diff
# and no commit.
on:
  schedule:
    - cron: "0 6 5,15,25 * *"   # 06:00 UTC on the 5th, 15th and 25th
  workflow_dispatch:
    inputs:
      refresh_yearly:
        description: "Re-download and re-parse the yearly Excel"
        type: boolean
        default: false
      force:
        description: "Re-fetch and re-parse every month (revision sweep)"
        type: boolean
        default: false

permissions:
  contents: write   # commit refreshed data back to the branch
  issues: write     # open/update a failure issue

# Never let two runs push concurrently.
concurrency:
  group: monthly-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Update dataset
        id: update
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/update.py \
            ${{ inputs.refresh_yearly && '--refresh-yearly' || '' }} \
            ${{ inputs.force && '--force' || '' }} \
            2>&1 | tee -a pipeline.log

      - name: Commit and push data changes
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain data docs)" ]]; then
            git add data docs
            git commit -m "data: automated update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "Committed data changes."
          else
            echo "No data changes -- nothing to commit."
          fi

      - name: Validate dataset
        id: validate
        continue-on-error: true
        run: |
          set -o pipefail
          python scripts/validate.py 2>&1 | tee -a pipeline.log

      - name: Report failure as an issue
        if: steps.update.outcome == 'failure' || steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('pipeline.log', 'utf8'); } catch (e) {}
            const tail = log.length > 6000 ? log.slice(-6000) : log;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const label = 'pipeline-failure';
            const body = [
              `The monthly production update failed on ${new Date().toISOString()}.`,
              ``,
              `- update step: **${{ steps.update.outcome }}**`,
              `- validate step: **${{ steps.validate.outcome }}**`,
              `- run: ${runUrl}`,
              ``,
              `<details><summary>Log tail</summary>`,
              ``,
              '```',
              tail,
              '```',
              `</details>`,
            ].join('\n');

            // Ensure the label exists.
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              await github.rest.issues.createLabel({
                ...context.repo, name: label, color: 'b60205',
                description: 'Automated data pipeline failure',
              });
            }

            // Reuse an open failure issue if one exists, else open a new one.
            const existing = await github.rest.issues.listForRepo({
              ...context.repo, state: 'open', labels: label, per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo, title: 'Monthly production update failed',
                labels: [label], body,
              });
            }

      - name: Fail the job if any step failed
        if: steps.update.outcome == 'failure' || steps.validate.outcome == 'failure'
        run: |
          echo "update=${{ steps.update.outcome }} validate=${{ steps.validate.outcome }}"
          exit 1
